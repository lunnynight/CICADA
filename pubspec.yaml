name: cicada
description: "Cicada - OpenClaw Launcher for Everyone"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  http: ^1.2.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  window_manager: ^0.4.3
  path_provider: ^2.1.5
  file_picker: ^8.1.6
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_annotation: ^2.6.1
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/presets/
