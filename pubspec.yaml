name: cicada
description: "Cicada - OpenClaw Launcher for Everyone"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  window_manager: ^0.4.3
  path_provider: ^2.1.5
  file_picker: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/presets/
