name: cicada
description: "Cicada - OpenClaw Launcher for Everyone"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  http: ^1.2.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  window_manager: ^0.4.3
  path_provider: ^2.1.5
  file_picker: ^8.1.6
  fl_chart: ^0.68.0
  super_clipboard: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  custom_lint: ^0.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/presets/
    - assets/bundled_skills/
    - assets/bundled_skills/code-review/
    - assets/bundled_skills/doc-gen/
    - assets/bundled_skills/test-helper/
    - assets/bundled_skills/git-helper/
    - assets/bundled_skills/refactor/
    - assets/bundled_skills/i18n/
